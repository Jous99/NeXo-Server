[eupld]
; Desactiva el envío de reportes de error a Nintendo
upload_enabled = u8!0x0

[usb]
; usb30_force_enabled = u8!0x0

[ro]
; ease_nro_restriction = u8!0x1

[lm]
; enable_sd_card_logging = u8!0x1

[erpt]
; disable_automatic_report_cleanup = u8!0x0

[atmosphere]
; fatal_auto_reboot_interval = u64!0x0
; power_menu_reboot_function = str!payload
; dmnt_cheats_enabled_by_default = u8!0x1
; dmnt_always_save_cheat_toggles = u8!0x0
; enable_hbl_bis_write = u8!0x0
; enable_hbl_cal_read = u8!0x0
; fsmitm_redirect_saves_to_sd = u8!0x0
; enable_am_debug_mode = u8!0x0

; ── DNS MITM (necesario para que el archivo hosts funcione) ──────────────────
; IMPORTANTE: sin esta línea, /atmosphere/hosts/default.txt es ignorado
enable_dns_mitm = u8!0x1

; Usar SOLO tu hosts file — sin las redirecciones por defecto de Atmosphere
; Ponlo en 0 para que solo use tu default.txt, sin mezclar otras reglas
add_defaults_to_dns_hosts = u8!0x0

; Activa el log de DNS en la SD (útil para ver qué dominios resuelve la Switch)
; Desactívalo cuando todo funcione para no llenar la SD de logs
enable_dns_mitm_debug_log = u8!0x1

; enable_htc = u8!0x0
; enable_log_manager = u8!0x0
; enable_external_bluetooth_db = u8!0x0

[hbloader]
; applet_heap_size = u64!0x0
; applet_heap_reservation_size = u64!0x8600000
