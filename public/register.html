<!DOCTYPE html>
<html>
<head>
    <title>Unirse a Eden Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="color:var(--nintendo-red)">Crear Cuenta</h2>
            <p>Introduce un nombre de usuario y contraseña para empezar.</p>
            <form id="regForm">
                <input type="text" id="username" placeholder="Usuario" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">REGISTRARSE</button>
            </form>
            <p style="font-size:12px; margin-top:20px;">¿Ya tienes cuenta? <a href="login.html" style="color:var(--nintendo-red)">Inicia sesión</a></p>
        </div>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/v1/web/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username.value, password: password.value })
            });
            const data = await res.json();
            if(data.success) { alert("¡Cuenta creada!"); window.location.href = 'login.html'; }
            else { alert(data.message); }
        };
    </script>
</body>
</html>
