<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Eden Network - Login</title>
    <style>
        body { background: #0f111a; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .card { background: #1a1d2e; display: inline-block; padding: 40px; border-radius: 15px; border: 1px solid #303651; }
        input { display: block; width: 250px; margin: 10px auto; padding: 12px; border-radius: 5px; border: none; background: #252943; color: white; }
        button { width: 100%; padding: 12px; background: #00d1ff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Eden Network</h2>
        <form id="loginForm">
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">ENTRAR</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const body = JSON.stringify(Object.fromEntries(new FormData(e.target)));
            const res = await fetch('/api/v1/web/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('eden_user', JSON.stringify(data.user));
                window.location.href = data.redirect;
            } else {
                alert(data.message);
            }
        };
    </script>
</body>
</html>
