<!DOCTYPE html>
<html>
<head>
    <title>Eden Network - Login</title>
    <style>
        body { background: #121212; color: white; font-family: Arial; text-align: center; padding-top: 50px; }
        form { display: inline-block; background: #1e1e1e; padding: 20px; border-radius: 10px; }
        input { display: block; margin: 10px auto; padding: 10px; width: 200px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
    </form>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));

            try {
                const response = await fetch('/api/v1/web/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    // Guardamos el PID y datos para el Dashboard
                    localStorage.setItem('eden_user', JSON.stringify(result.user));
                    // Redirigimos al dashboard real
                    window.location.href = "/dashboard"; 
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                alert("Servidor no responde. Revisa la consola.");
            }
        };
    </script>
</body>
</html>
