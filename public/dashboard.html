<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | Eden Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: white;">
    <nav class="navbar">
        <div class="logo-container"><span class="logo-text">EDEN DASHBOARD</span></div>
        <a href="index.html" class="btn btn-outline" style="padding: 8px 20px;">Salir</a>
    </nav>

    <div style="max-width: 900px; margin: 40px auto; padding: 0 20px;">
        <div style="background: var(--nintendo-red); color: white; padding: 40px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="margin:0">Hola, <span id="displayUser">Explorador</span></h1>
                <p>Tu cuenta está vinculada a la red Eden Network Global.</p>
            </div>
            <div style="background:rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 50px; font-weight: bold;">
                Status: Lifetime Premium
            </div>
        </div>

        <div class="info-grid" style="padding: 30px 0;">
            <div class="info-card" style="border: 1px solid #eee;">
                <h3>Configuración Emulador</h3>
                <p>Tu ID de usuario para el cliente EdenOnline es único. Úsalo para iniciar sesión dentro de la aplicación.</p>
                <code style="background: #f0f0f0; padding: 5px; border-radius: 5px;">Server: Global_Node_Alpha</code>
            </div>
        </div>
    </div>
    <script>
        // Simulación sencilla de carga de datos
        document.getElementById('displayUser').innerText = localStorage.getItem('eden_user') || 'Usuario';
    </script>
</body>
</html>
