<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eden Network | Dashboard</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1c1f26; padding: 30px; border-radius: 15px; border: 1px solid #363a45; width: 400px; text-align: center; }
        h1 { color: #00d1ff; margin-bottom: 20px; }
        .info-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: left; }
        .label { color: #8a8d97; font-size: 0.8em; font-weight: bold; }
        .value { font-family: monospace; font-size: 1.1em; color: #fff; margin-top: 5px; }
        .btn { background: #00d1ff; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .logout { background: transparent; color: #ff4b2b; border: 1px solid #ff4b2b; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Mi Perfil Eden</h1>
        <div class="info-box">
            <div class="label">USUARIO</div>
            <div id="user" class="value">---</div>
        </div>
        <div class="info-box">
            <div class="label">PRINCIPAL ID (PID)</div>
            <div id="pid" class="value" style="color: #ffcc00;">---</div>
        </div>
        <div class="info-box">
            <div class="label">FRIEND CODE</div>
            <div id="fc" class="value" style="color: #00ff88;">---</div>
        </div>
        <div class="info-box">
            <div class="label">RANGO</div>
            <div id="role" class="value">---</div>
        </div>
        <button class="btn logout" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('eden_user'));
        if (!data) window.location.href = "/login";

        document.getElementById('user').innerText = data.username;
        document.getElementById('pid').innerText = data.pid || "Generando...";
        document.getElementById('fc').innerText = data.friend_code || "Generando...";
        document.getElementById('role').innerText = (data.role || 'user').toUpperCase();

        function logout() {
            localStorage.clear();
            window.location.href = "/login";
        }
    </script>
</body>
</html>
